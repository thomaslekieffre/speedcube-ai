name: Deploy to Coolify

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deployment
        run: |
          curl -s -X GET \
            "http://51.68.231.68:8000/api/v1/deploy?uuid=${{ secrets.COOLIFY_SPEEDCUBE_AI_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
